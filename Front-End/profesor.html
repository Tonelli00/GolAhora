<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Profesor | GolAhora</title>

    <link rel="stylesheet" href="./css/profesor/profesor.css">
    <link rel="stylesheet" href="./css/profesor/ClasesCards.css">
    <link rel="stylesheet" href="./css/profesor/RenderProfesorRegistrar.css">
    <link rel="stylesheet" href="./css/profesor/RenderAlumnos.css">

    <script type="module" src="main.js"></script>
</head>

<body>

<div class="dashboard">
    <aside class="sidebar">

        <h2 class="logoProfesor">
            Gol<span>Ahora</span>
        </h2>

        <nav class="sidebar-nav">

            <button class="sidebar-btn" id="btnRegistrarAsistencia">
                Pasar asistencia
            </button>

            <button class="sidebar-btn" id="btnConsultar">
                Ver clases asignadas
            </button>

        </nav>

    </aside>


    <main class="main" id="contenidoPrincipal">

        <header class="topbar">

            <h1>Panel de Profesor</h1>

        </header>


        <section class="hero">

            <div class="overlay">

                <h1 style="color:#22c55e;">
                    Bienvenido
                </h1>

                <p>
                    Gestiona clases y asistencias
                </p>

            </div>

        </section>

        <section class="content-section" id="Registrar"></section>

        <section class="content-section hidden" id="Consultar"></section>

    </main>

</div>

</body>
</html>
