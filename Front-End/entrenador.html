<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Panel Entrenador | GolAhora
    </title>

    <link rel="stylesheet" href="./css/Entrenador/entrenador.css">
    <link rel="stylesheet" href="./css/global/global.css">
    <link rel="stylesheet" href="./css/global/toast.css">
    <link rel="stylesheet" href="./css/Admin/adminCanchaCards.css">
    <link rel="stylesheet" href="./css/Entrenador/cardEntrenador.css">
    <link rel="stylesheet" href="./css/Entrenador/listaEntrenador.css">
    <link rel="stylesheet" href="./css/Entrenador/asistencia.css">
    <link rel="stylesheet" href="./css/profesor/cardasistencias.css">
    <script type="module" src="./main.js"></script>

</head>

<body>

    <div class="dashboard">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <h2 class="logoEntrenador">
                Gol<span>Ahora</span>
            </h2>

            <nav class="sidebar-nav">

                <button  class="sidebar-btn"
                    id="btnRegistrarAsistencia"
                >
                    Pasar asistencia
                </button>

                <button
                    class="sidebar-btn"
                    id="btnConsultar"
                >
                    Ver entrenamientos asignados
                </button>

            </nav>

        </aside>

        <!-- MAIN -->
        <main class="main">

            <!-- TOPBAR -->
            <header class="topbar">

                <h1>
                    Panel de Entrenador
                </h1>

              

            </header>

            <!-- HERO -->
            <section class="hero">

                <div class="overlay">

                    <h1>
                        Bienvenido
                    </h1>

                    <p>
                        Gestiona entrenamientos y asistencias
                    </p>

                </div>

            </section>

            <!-- SECCIONES -->
            <section
                class="content-section"
                id="Registrar"
            ></section>

            <section
                class="content-section hidden"
                id="Consultar"
            ></section>

        </main>

    </div>

</body>

</html>
