<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emisión de Recibos | GolAhora</title>
  
  <link rel="stylesheet" href="./css/Admin/admin.css">
  <link rel="stylesheet" href="./css/Admin/adminCanchaCards.css">
  <link rel="stylesheet" href="./css/Admin/adminTcCards.css">
  <link rel="stylesheet" href="./css/global/toast.css">
  
  <script type="module" src="./js/recibos/recibo.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

    /* Contenedor del logo: Tamaño más chico y compacto */
    .dashboard .sidebar h2.logo {
        display: inline-block !important;
        font-family: 'Bebas Neue', sans-serif !important;
        font-size: 1.9rem !important; /* Un poco más chico y estilizado */
        color: #22c55e !important;   /* Verde puro, sin efectos */
        letter-spacing: 1px !important;
        cursor: pointer !important;
        position: relative !important;
        margin: 0 0 3rem 0 !important; 
        padding: 0 1rem !important;    /* Sacamos padding vertical para ajustar la línea */
        line-height: 0.9 !important;   /* Achica la caja de texto para arrastrar el subrayado */
        text-decoration: none !important;
        text-transform: none !important;
        text-shadow: none !important;  /* Garantiza cero brillo */
    }

    /* El "Ahora" en blanco sólido */
    .dashboard .sidebar h2.logo span {
        font-family: 'Bebas Neue', sans-serif !important;
        color: #ffffff !important;     /* Blanco puro */
        letter-spacing: 1px !important;
        text-decoration: none !important;
        text-shadow: none !important;  /* Garantiza cero brillo */
    }

    /* La línea verde fija: pegada al ras absoluto del texto */
    .dashboard .sidebar h2.logo::after {
        content: "" !important;
        position: absolute !important;
        left: 1rem !important;
        bottom: -3px !important;       /* Pegada al ras de la base de las letras */
        width: calc(100% - 2rem) !important; 
        height: 3px !important;              
        background: #22c55e !important;/* Verde sólido */
        box-shadow: none !important;   /* Cero resplandor */
    }
  </style>
</head>
<body>

  <div class="dashboard">

    <aside class="sidebar">
      <div>
        <a href="index.html" style="text-decoration: none; display: inline-block;">
  <h2 class="logo">
    Gol<span>Ahora</span>
  </h2>
</a>

        <nav class="sidebar-nav">
          <a href="dashboard.html" class="sidebar-btn" style="text-decoration: none; display: block; text-align: left;">
             Dashboard
          </a>
          <a href="canchas.html" class="sidebar-btn" style="text-decoration: none; display: block; text-align: left;">
            Canchas
          </a>
          <a href="tipocanchas.html" class="sidebar-btn" style="text-decoration: none; display: block; text-align: left;">
            Tipo de canchas
          </a>
          <a href="modulo financiero.html" class="sidebar-btn active" style="text-decoration: none; display: block; text-align: left;">
            Cobros y Recibos
          </a>
        </nav>
      </div>
      
    </aside>

    <main class="main">

      <header class="topbar">
        <h1>Panel de Recibos</h1>
        <div class="user">👤 Admin</div>
      </header>

      <section class="content-section" style="padding: 2rem; max-width: 1200px; box-sizing: border-box;">
        
        <div style="margin-bottom: 1.5rem;">
          <a href="modulo_financiero.html" style="color: #a3a3a3; text-decoration: none; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 0.5rem;">
            &larr; Volver a Cobros y Recibos
          </a>
        </div>

        <div style="margin-bottom: 3rem;">
          <h3 style="font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: #22c55e; margin-bottom: 1.2rem; letter-spacing: 1px; text-transform: uppercase;">
            Acciones:
          </h3>
          
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.2rem;">
            
            <button class="action-recibo-btn" id="btn-generar-recibo" style="background: #161616; border: 1px solid rgba(255,255,255,0.05); padding: 2rem; border-radius: 10px; color: #fff; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 1.5rem; transition: all 0.2s; width: 100%;">
              <span style="font-size: 2.2rem; background: rgba(34, 197, 94, 0.1); padding: 0.6rem; border-radius: 8px; color: #22c55e;">🧾</span>
              <div>
                <strong style="display: block; font-size: 1.25rem;">Generar Recibo</strong>
              </div>
            </button>

            <button class="action-recibo-btn" id="btn-modificar-recibo" style="background: #161616; border: 1px solid rgba(255,255,255,0.05); padding: 2rem; border-radius: 10px; color: #fff; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 1.5rem; transition: all 0.2s; width: 100%;">
              <span style="font-size: 2.2rem; background: rgba(234, 179, 8, 0.1); padding: 0.6rem; border-radius: 8px; color: #eab308;">✏️</span>
              <div>
                <strong style="display: block; font-size: 1.25rem;">Modificar Recibo</strong>
              </div>
            </button>

            <button class="action-recibo-btn" id="btn-consultar-recibo" style="background: #161616; border: 1px solid rgba(255,255,255,0.05); padding: 2rem; border-radius: 10px; color: #fff; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 1.5rem; transition: all 0.2s; width: 100%;">
              <span style="font-size: 2.2rem; background: rgba(168, 85, 247, 0.1); padding: 0.6rem; border-radius: 8px; color: #a855f7;">🔍</span>
              <div>
                <strong style="display: block; font-size: 1.25rem;">Consultar Recibo</strong>
              </div>
            </button>

            <button class="action-recibo-btn" id="btn-imprimir-recibo" style="background: #161616; border: 1px solid rgba(255,255,255,0.05); padding: 2rem; border-radius: 10px; color: #fff; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 1.5rem; transition: all 0.2s; width: 100%;">
              <span style="font-size: 2.2rem; background: rgba(59, 130, 246, 0.1); padding: 0.6rem; border-radius: 8px; color: #3b82f6;">🖨️</span>
              <div>
                <strong style="display: block; font-size: 1.25rem;">Imprimir Copia</strong>
              </div>
            </button>

          </div>
        </div>

      </section>

    </main>

  </div>

</body>
</html>
