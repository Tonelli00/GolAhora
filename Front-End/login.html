<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión - Gol Ahora</title>
  <link rel="stylesheet" href="./css/style.css"/>
  <link rel="stylesheet" href="./css/global/global.css">
  <link rel="stylesheet" href="./css/Forms/login.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="./js/Clientes/Login/login.js"></script>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">GOL<span>AHORA</span></a>
    <a href="registro.html" style="color: var(--texto-suave); text-decoration: none; font-size: 0.9rem;">¿No tenés cuenta? <span style="color: var(--verde); font-weight: 600;">Registrate</span></a>
  </nav>

  <div class="main">
    <div class="form-card">
      <h1>Iniciar <span>Sesión</span></h1>
      <p class="subtitle">Ingresá tus datos para acceder al sistema</p>

      <div class="alert" id="successAlert">✓ Sesión iniciada correctamente. Redirigiendo...</div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@correo.com"/>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••"/>
        <div class="forgot"><a href="#">¿Olvidaste tu contraseña?</a></div>
      </div>

      <button class="btn-submit" onclick="handleLogin()">Ingresar</button>

      <div class="divider"></div>

      <div class="register-link">
        ¿No tenés cuenta? <a href="registro.html">Registrate gratis</a>
      </div>
    </div>
  </div>

</body>
</html>
