<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Panel Admin | GolAhora</title>
  <link rel="stylesheet" href="./css/Admin/admin.css">
  <link rel="stylesheet" href="./css/Admin/adminCanchaCards.css">
  <link rel="stylesheet" href="./css/Admin/adminTcCards.css">
  <link rel="stylesheet" href="./css/Admin/Modals/CanchaModals.css">
  <link rel="stylesheet" href="./css/global/toast.css">
  <link rel="stylesheet" href="./css/Admin/Modals/EditarCanchaModal.css">
  <script type="module" src="./js/Admin/Modals/crearCancha.js"></script>
  <script type="module" src="./js/Admin/Modals/editarCancha.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<body>

  <div class="dashboard">

    <aside class="sidebar">

      <h2 class="logo">
        Gol<span>Ahora</span>
      </h2>

      <nav class="sidebar-nav">

        <button class="sidebar-btn active">
           Dashboard
        </button>

        <button class="sidebar-btn">
          Canchas
        </button>

        <button class="sidebar-btn">
          Tipo de canchas
        </button>
        <button class="sidebar-btn">
          Clases
        </button>

          Entrenamientos
        </button>

        <button class="sidebar-btn">
          Torneos
        </button>

        <button class="sidebar-btn">
          Ligas
        </button>

    </aside>

    <main class="main">

      <header class="topbar">

        <h1>
          Panel de Administración
        </h1>

        <div class="user">
          👤 Admin
        </div>

      </header>

      <section class="content-section" id="dashboard"></section>

      <section class="content-section hidden" id="canchas"></section>

      <section class="content-section hidden" id="tipoCanchas"></section>
