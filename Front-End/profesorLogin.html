<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión - Gol Ahora</title>
  <link rel="stylesheet" href="./css/style.css"/>
  <link rel="stylesheet" href="./css/Forms/login.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="./js/profesor/login/ProfeLogin.js"></script>
</head>
<body>

    <div class="main">
    <div class="form-card">
      <h1>Iniciar <span>Sesión Profesor</span></h1>
      <p class="subtitle">Ingresá tus datos para acceder al panel de clases</p>

      <div class="alert" id="successAlert">✓ Sesión iniciada correctamente. Redirigiendo...</div>

      <div class="form-group">
        <label for="email" >Correo electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@correo.com"/>
      </div>

      <div class="form-group">
        <label for="password" >Contraseña</label>
        <input type="password" id="password" placeholder="••••••••"/>
      </div>

      <button class="btn-submit" onclick="ProfesorLogin()">Ingresar</button>

 

    </div>
  </div>

</body>
</html>
